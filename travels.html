<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travels</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f7f4ee;
            color: #2a2826;
            padding: 40px 30px;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 400;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #5a5856;
            font-style: italic;
            margin-bottom: 40px;
        }

        .travels-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .destination {
            margin-bottom: 50px;
        }

        .destination-header {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0dcd4;
            padding-bottom: 10px;
        }

        .destination-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
        }

        .destination-date {
            color: #888;
            font-size: 0.9rem;
            font-style: italic;
        }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery-photo {
            aspect-ratio: 1;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .gallery-photo:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .gallery-photo.wide {
            grid-column: span 2;
            aspect-ratio: 2/1;
        }

        .gallery-photo.tall {
            grid-row: span 2;
            aspect-ratio: 1/2;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
            padding: 20px;
        }

        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }

        .note {
            text-align: center;
            margin-top: 40px;
            font-style: italic;
            color: #888;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .photo-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
            .gallery-photo.wide {
                grid-column: span 1;
                aspect-ratio: 1;
            }
        }
    </style>
</head>
<body>
    <h1>travels</h1>
    <p class="subtitle">adventures near & far</p>

    <div class="travels-container" id="travels-container"></div>

    <p class="note">click any photo to enlarge</p>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#8249;</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#8250;</button>
    </div>

    <script>
        // ===== EDIT YOUR TRAVELS HERE =====
        // Add destinations and their photos below
        const travelsData = [
            {
                name: "Stockholm, Sweden",
                date: "Summer 2025",
                photos: [
                    "images/Photos-3-002/PXL_20250614_160523560.jpg",
                    "images/Photos-3-002/PXL_20250616_094926988.jpg",
                    "images/Photos-3-002/PXL_20250616_111211728.jpg",
                    // Add more Stockholm photos here
                ]
            },
            {
                name: "Cape Cod, MA",
                date: "Summer 2025",
                photos: [
                    "images/Photos-3-002/PXL_20250703_220913610.jpg",
                    "images/Photos-3-002/PXL_20250704_221518906.jpg",
                    "images/Photos-3-002/PXL_20250705_005937045.jpg",
                    // Add more Cape Cod photos here
                ]
            },
            {
                name: "Washington, DC",
                date: "2025",
                photos: [
                    "images/Photos-3-002/IMG_8046.jpg",
                    // Add more DC photos here
                ]
            },
            {
                name: "Bay Area Hikes",
                date: "Ongoing",
                photos: [
                    "images/Photos-3-002/IMG_1571.JPG",
                    // Add more hiking photos here
                ]
            },
            {
                name: "Los Angeles, CA",
                date: "2026",
                photos: [
                    // Add LA photos here!
                ]
            },
            {
                name: "San Diego, CA",
                date: "2026",
                photos: [
                    // Add San Diego photos here!
                ]
            },
            {
                name: "Arizona",
                date: "2026",
                photos: [
                    // Add Arizona photos here!
                ]
            },
            // Add more destinations here!
        ];

        // Render galleries
        const container = document.getElementById('travels-container');

        travelsData.forEach(destination => {
            if (destination.photos.length === 0) return;

            const section = document.createElement('div');
            section.className = 'destination';

            section.innerHTML = `
                <div class="destination-header">
                    <h2 class="destination-name">${destination.name}</h2>
                    <span class="destination-date">${destination.date}</span>
                </div>
                <div class="photo-gallery">
                    ${destination.photos.map((photo, i) => `
                        <div class="gallery-photo ${i === 0 ? 'wide' : ''}"
                             style="background-image: url('${photo}')"
                             onclick="openLightbox('${photo}', '${destination.name}', ${destination.photos.indexOf(photo)})"
                             data-destination="${destination.name}">
                        </div>
                    `).join('')}
                </div>
            `;

            container.appendChild(section);
        });

        // Lightbox functionality
        let currentPhotos = [];
        let currentIndex = 0;

        function openLightbox(photo, destinationName, index) {
            const destination = travelsData.find(d => d.name === destinationName);
            currentPhotos = destination.photos;
            currentIndex = index;

            document.getElementById('lightbox-img').src = photo;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function navigateLightbox(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = currentPhotos.length - 1;
            if (currentIndex >= currentPhotos.length) currentIndex = 0;
            document.getElementById('lightbox-img').src = currentPhotos[currentIndex];
        }

        // Close lightbox on escape or click outside
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
    </script>
</body>
</html>
